- type: entity
  name: brigmedic's syringe gun
  parent: [BaseStorageItem, BaseSecurityContraband]
  id: LauncherSyringeHarmony
  description: Load full of poisoned syringes for optimal fun.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Cannons/syringe_gun.rsi
    layers:
    - state: syringe_gun
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,0,0
    whitelist:
      tags:
      - SyringeGunAmmo
  - type: Gun
    fireRate: 1
    selectedMode: SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/syringe_gun.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty.ogg
    clumsyProof: true
  - type: ContainerAmmoProvider
    container: storagebase
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
  - type: StorageFill
    contents:
    - id: MiniSyringe

- type: entity
  name: bola cannon
  parent: [BaseStorageItem, BaseMinorContraband]
  id: WeaponSecurityBolaCannonHarmony
  description: A small form factor pneumatic cannon designed to shoot bolas.
  components:
  - type: Sprite
    sprite: _Harmony/Objects/Weapons/Guns/Cannons/bola_cannon.rsi
    layers:
    - state: icon
    - state: tank
      map: [ "tank" ]
      visible: false
  - type: Item
    size: Small
    shape:
    - 0,0,1,1
    - 0,1,0,1
    storedOffset: 0,-4
  - type: Clothing
    quickEquip: false
    slots:
    - suitStorage
    - Belt
  - type: Gun
    fireRate: .5
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/grenade_launcher.ogg
    soundEmpty:
      path: /Audio/Items/hiss.ogg
    clumsyProof: true
  - type: ContainerAmmoProvider
    container: storagebase
  - type: PneumaticCannon
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,0,1
  - type: Appearance
  - type: ItemMapper
    containerWhitelist: [gas_tank]
    mapLayers:
      tank:
        whitelist:
          components:
          - GasTank
  - type: ItemSlots
    slots:
      gas_tank:
        name: pneumatic-cannon-component-itemslot-name
        whitelist:
          components:
          - GasTank
        insertSound:
          path: /Audio/Weapons/click.ogg
          params:
            volume: -3
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
      gas_tank: !type:ContainerSlot
